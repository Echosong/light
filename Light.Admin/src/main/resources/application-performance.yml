spring:
  datasource:
    # HikariCP 数据库连接池优化配置
    hikari:
      # 连接池中允许的最小连接数
      minimum-idle: 5
      # 连接池中允许的最大连接数
      maximum-pool-size: 20
      # 自动提交
      auto-commit: true
      # 连接超时时间(毫秒)
      connection-timeout: 30000
      # 连接在池中闲置的最长时间(毫秒)
      idle-timeout: 600000
      # 连接的最长生命周期(毫秒)
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 连接池名称
      pool-name: HikariPool-Light
      # 检测连接是否有效的超时时间(毫秒)
      validation-timeout: 5000
      # 是否在连接池中维护空闲连接
      keepalive-time: 600000
      # 泄漏检测阈值(毫秒)，0表示禁用
      leak-detection-threshold: 60000

# MyBatis-Plus配置优化
mybatis-plus:
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 开启二级缓存
    cache-enabled: true
    # 开启延迟加载
    lazy-loading-enabled: true
    # 关闭积极加载
    aggressive-lazy-loading: false
    # 设置超时时间
    default-statement-timeout: 30
    # 设置默认执行器类型
    default-executor-type: reuse
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键类型
      id-type: auto

# Redis 配置优化
spring:
  data:
    redis:
      # 连接超时时间
      timeout: 6000ms
      # 连接池配置
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 20
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 2
          # 获取连接最大等待时间
          max-wait: 2000ms
        # 关闭超时时间
        shutdown-timeout: 100ms

# 日志配置
logging:
  level:
    # 数据库SQL日志
    cn.light: debug
    # HikariCP日志
    com.zaxxer.hikari: info
    # Redis日志
    org.springframework.data.redis: info
  pattern:
    # 控制台日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    # 文件日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"